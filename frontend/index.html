<!DOCTYPE html>
<html>
<head>
  <title>Auth App</title>
</head>
<body>

<h2>Signup</h2>
<input id="su_user" placeholder="Username">
<input id="su_pass" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<input id="li_user" placeholder="Username">
<input id="li_pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h2>Dashboard</h2>
<button onclick="dashboard()">Get Dashboard</button>

<p id="output"></p>

<script>
let token = "";

async function signup() {
  const res = await fetch("http://localhost:5000/api/auth/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: su_user.value,
      password: su_pass.value
    })
  });

  output.innerText = await res.text();
}

async function login() {
  const res = await fetch("http://localhost:5000/api/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: li_user.value,
      password: li_pass.value
    })
  });

  const data = await res.json();
  token = data.token;
  output.innerText = "Logged in!";
}

async function dashboard() {
  const res = await fetch("http://localhost:5000/api/auth/dashboard", {
    headers: {
      "Authorization": token
    }
  });

  const data = await res.json();
  output.innerText = JSON.stringify(data);
}
</script>

</body>
</html>
